name: Verify Code Compilation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Check Python Syntax & Compilation
      run: |
        python -m py_compile main.py email_service.py config.py notebooklm_service.py
        echo "All files compile successfully!"
