name: Compile & Release Desktop Applications

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags (e.g. v1.0.0, v2.1.3)

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt

      - name: Build macOS App Bundle
        run: |
          chmod +x scripts/build_mac_app.sh
          ./scripts/build_mac_app.sh

      - name: Compress App Bundle
        run: |
          cd dist
          zip -r ../TubeLM-macOS.zip TubeLM.app
          cd ..

      - name: Upload macOS Asset
        uses: softprops/action-gh-release@v2
        with:
          files: TubeLM-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt

      - name: Build Windows Executable
        run: |
          .\scripts\build_win_app.bat

      - name: Compress Windows Folder
        run: |
          cd dist
          Compress-Archive -Path TubeLM -DestinationPath ..\TubeLM-Windows.zip
          cd ..

      - name: Upload Windows Asset
        uses: softprops/action-gh-release@v2
        with:
          files: TubeLM-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux DEB Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build Linux Debian Package
        run: |
          chmod +x scripts/build_linux_deb.sh
          ./scripts/build_linux_deb.sh

      - name: Upload Linux Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tubelm_1.0.0_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
